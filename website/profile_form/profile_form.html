          <div class="d-flex mb-2">
            <span class="me-4"><strong class="h5">921</strong> Đã follow</span>

            <span class="me-4"><strong class="h5">818</strong> Lượt thích</span>
          </div>
          <p class="small text-muted">
            Tiểu Sử: Tôi đang không biết mình đang học cái gì nữa
